# microG Universal Installer -- build-time manifest (source of truth).
#
# Pinned facts the hermetic build resolves: per component the package, type,
# partition, versionCode, source, url, APK sha256, and signer-cert sha256.
# Edited ONLY on a microG bump, by tools/bump (the one network-trusting step).
#
# Trust anchors (3, see design spec section 5.4 / 6):
#   version_code        -- what the device PackageManager compares.
#   sha256              -- integrity: exactly which APK bytes (changes per release).
#   signer_cert_sha256  -- authenticity: who published (stable trust root).
#                          A change here is a SECURITY EVENT, never an auto-bump
#                          (tools/bump hard-fails; see design spec section 6.2).
#
# sha256 = "PENDING-BUMP" is the sentinel for "no real hash pinned yet".
# build.sh refuses to build while any non-deferred component is PENDING-BUMP --
# correct and intended until `tools/bump` runs and fills the real hashes.
#
# microG signing cert SHA-256 (signs GmsCore / GsfProxy / FakeStore, and the
# F-Droid repo index): 9bd06727e62796c0130eb6dab39b73157451582cbd138e86c468acc395d14165

schema_version = 1

# microG Services Core -- mandatory core component.
# Standard build (not -hw / -user). v0.3.15.x, versionCode 250932030.
# Sourced from the microG F-Droid repo (index-v2.json), keyed by package -- the
# canonical microG-signed distribution and the same source MinMicroG uses.
# tools/bump resolves the latest version + sha256 from the index and rewrites url.
[[apk]]
name               = "GmsCore"
package            = "com.google.android.gms"
type               = "app"
partition          = "product"
version_code       = 250932030
source             = "fdroid"
url                = "https://microg.org/fdroid/repo/com.google.android.gms-250932030.apk"
sha256             = "52597e77fd25fdd347574d0457ed1936a4b9561cf4c8d34e7ac8dd8191dfd4b9"
signer_cert_sha256 = "9bd06727e62796c0130eb6dab39b73157451582cbd138e86c468acc395d14165"
conflicts          = []

# GsfProxy -- legacy Google Services Framework shim (com.google.android.gsf).
# Required for GCM/C2DM push and apps hardcoded to the GSF package; microG keeps
# it a SEPARATE package from GmsCore by design (it must own the gsf namespace).
# microG-signed; sourced from the microG F-Droid repo, which resolves cleanly by
# package (the GitHub release asset is just "GsfProxy.apk", which bump can't match).
[[apk]]
name               = "GsfProxy"
package            = "com.google.android.gsf"
type               = "app"
partition          = "product"
version_code       = 8
source             = "fdroid"
url                = "https://microg.org/fdroid/repo/com.google.android.gsf-8.apk"
sha256             = "86891b174301f06a1c84187b545a0a2a57044c6b768f3e84e865908743349692"
signer_cert_sha256 = "9bd06727e62796c0130eb6dab39b73157451582cbd138e86c468acc395d14165"
conflicts          = []

# FakeStore (microG Companion) -- default store stub. microG-signed.
# Mutually exclusive with Phonesky (same package com.android.vending).
# Sourced from the microG F-Droid repo (the Companion ships there; same source
# as MinMicroG). tools/bump resolves the latest version + sha256 from the index.
[[apk]]
name               = "FakeStore"
package            = "com.android.vending"
type               = "app"
partition          = "product"
version_code       = 84022630
source             = "fdroid"
url                = "https://microg.org/fdroid/repo/com.android.vending-84022630.apk"
sha256             = "a973e0235a2829773a4faf36d235d5f703d1c04a2adff674ebaa535a2e78f937"
signer_cert_sha256 = "9bd06727e62796c0130eb6dab39b73157451582cbd138e86c468acc395d14165"
conflicts          = ["Phonesky"]

# MapsV1 -- com.google.android.maps shared-library JAR (NOT an apk).
# type = "framework": the asset is maps.jar and goes to <part>/framework plus a
# permissions XML. fetch verifies sha256 ONLY (a JAR is not apksigner-verifiable),
# so signer_cert_sha256 is a documented placeholder.
# source = "vendored": there is no stable bare-jar download URL (microG's
# android_frameworks_mapsv1 ships only a flashable zip), so -- following the
# working micro5k/microg-unofficial-installer reference -- the jar is committed
# in-repo at the url path below and the build copies + sha256-verifies it.
# This is the ONE committed binary: a tiny (143 KB), immutable, FLOSS framework
# lib. tools/bump skips it (framework). version_code 9 matches micro5k.
[[apk]]
name               = "MapsV1"
package            = "com.google.android.maps"
type               = "framework"
partition          = "product"
version_code       = 9
source             = "vendored"
url                = "vendor/com.google.android.maps.jar"
sha256             = "a3e12a952183473de8f1725d3b01f784f01d35c33f6741bd8875fbdb91ebadae"
signer_cert_sha256 = "n-a-framework-jar"
conflicts          = []

# Phonesky (real Google Play Store) -- Google-signed (DIFFERENT cert from microG).
# Phase 2: no stable redistributable URL (design spec open question 12).
# DEFERRED: url = "" -> tools/bump and components.conf both skip it.
[[apk]]
name               = "Phonesky"
package            = "com.android.vending"
type               = "app"
partition          = "product"
version_code       = 0
source             = "github"
url                = ""  # Phase 2: no stable redistributable URL; bump skips this
sha256             = "PENDING-BUMP"
signer_cert_sha256 = "TODO-phase2"
conflicts          = ["FakeStore"]

# Google Contacts Sync Adapter -- GOOGLE-SIGNED proprietary (DIFFERENT cert from
# microG; it carries the Google release-signing cert, not the microG cert above).
# Installs as a NORMAL system app (system/app, NOT priv-app): it requests only
# normal/runtime perms through the account + sync (SyncAdapter/AccountManager)
# framework, so it needs NO privapp-permissions allowlist entry. NOTE: the schema
# has no app-vs-priv-app placement column yet (type=app => priv-app in
# common/place.sh); see report -- a non-priv-app placement is a follow-up. Harmless
# while deferred: an empty url means components.conf/place never touch it.
# DEFERRED: url = "" -> tools/bump and components.conf both skip it.
[[apk]]
name               = "GoogleContactsSyncAdapter"
package            = "com.google.android.syncadapters.contacts"
type               = "app"
partition          = "product"
version_code       = 0
source             = "github"
url                = ""  # deferred: pending a trustworthy pinned source; bump skips this
sha256             = "PENDING-BUMP"
signer_cert_sha256 = "TODO-google-signed"
conflicts          = []

